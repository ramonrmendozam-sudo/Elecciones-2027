<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta Regresiva - Elecciones México 2027</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            color: #6200ee;
            font-size: 2rem;
            text-align: center;
        }
        #countdown {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .time-box {
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            min-width: 80px;
        }
        .number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
        }
        .label {
            font-size: 0.9rem;
            color: #777;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h1>Cuenta regresiva para la Jornada Electoral en México<br><small style="font-size: 1.2rem; color: #555;">6 de junio de 2027</small></h1>
    
    <div id="countdown">
        <div class="time-box">
            <div class="number" id="days">00</div>
            <div class="label">Días</div>
        </div>
        <div class="time-box">
            <div class="number" id="hours">00</div>
            <div class="label">Horas</div>
        </div>
        <div class="time-box">
            <div class="number" id="minutes">00</div>
            <div class="label">Minutos</div>
        </div>
        <div class="time-box">
            <div class="number" id="seconds">00</div>
            <div class="label">Segundos</div>
        </div>
    </div>

    <script>
        // Fecha objetivo: 6 de junio de 2027 a las 08:00 AM (Apertura de casillas)
        const targetDate = new Date("June 6, 2027 08:00:00").getTime();

        const updateCountdown = setInterval(function() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference < 0) {
                clearInterval(updateCountdown);
                document.getElementById("countdown").innerHTML = "<h2>¡La jornada electoral ha comenzado!</h2>";
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;
        }, 1000);
    </script>
</body>
</html>
